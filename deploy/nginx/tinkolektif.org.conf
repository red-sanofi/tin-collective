upstream tin_frontend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name tinkolektif.org www.tinkolektif.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://tinkolektif.org$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tinkolektif.org;

    ssl_certificate /etc/letsencrypt/live/tinkolektif.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tinkolektif.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://tinkolektif.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tinkolektif.org;

    ssl_certificate /etc/letsencrypt/live/tinkolektif.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tinkolektif.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://tin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
