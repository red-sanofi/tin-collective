services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tin_collective}
      POSTGRES_USER: ${POSTGRES_USER:-tin_collective}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tin_collective}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tin_collective} -d ${POSTGRES_DB:-tin_collective}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,backend}
      POSTGRES_DB: ${POSTGRES_DB:-tin_collective}
      POSTGRES_USER: ${POSTGRES_USER:-tin_collective}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tin_collective}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
